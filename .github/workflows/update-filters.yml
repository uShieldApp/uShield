name: Update Filter Rules (OTA Delta)

on:
  schedule:
    # Run every day at 04:00 UTC (11:00 AM Vietnam time)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  update-filters:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate delta rules
        run: |
          mkdir -p ../output
          # Loop through all version directories in 'rules/'
          for vdir in rules/*; do
            if [ -d "$vdir/baseline" ]; then
              version=$(basename "$vdir")
              outdir="../output/rules/$version"
              delta_url="https://uShieldApp.github.io/uShield/rules/$version/delta_rules.json"
              
              mkdir -p "$outdir"
              echo "Generating delta for $version -> $outdir"
              
              python3 scripts/generate_delta.py \
                --baseline-dir "$vdir/baseline" \
                --output-dir "$outdir" \
                --delta-url "$delta_url" \
                --max-delta-rules 28000
            fi
          done

      - name: Deploy to GitHub Pages
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Switch to gh-pages branch (create if not exists)
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          # Clean everything except .git
          git rm -rf . 2>/dev/null || true
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true
          
          # Copy all generated output files and directories
          cp -R ../output/* .
          
          # Create a simple index.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>uShield Filter Updates</title></head>
          <body>
            <h1>uShield OTA Filter Updates</h1>
            <p>This page hosts the latest delta filter rules for uShield.</p>
            <p>Rules are organized by version (e.g., <a href="rules/v1.0.0/version.json">v1.0.0</a>)</p>
          </body>
          </html>
          EOF
          
          # Commit and push
          git add -A
          git commit -m "Update delta rules: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push origin gh-pages --force
